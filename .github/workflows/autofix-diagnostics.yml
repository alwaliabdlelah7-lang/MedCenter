name: AutoFix & Diagnostics
env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # يجبر actions JS على تشغيل Node.js 24 الآن (يتجنّب التحذير)
on:
workflow_dispatch:
push:

branches:
  - main
schedule:

- cron: '0 3 * * *' # تشغيل يومي عند 03:00 UTC (قابل للتعديل)
permissions:
contents: write # للسماح بعمل commits/PRs باستخدام GITHUB_TOKEN
pull-requests: write

jobs:
diagnostics-and-autofix:

name: Diagnostics, Build, Auto-fix & Report
runs-on: ubuntu-latest
steps:
  - name: Checkout repository (with write)
    uses: actions/checkout@v4
    with:
      persist-credentials: true
      fetch-depth: 0

  - name: Set up Node.js 20 (for npm tasks)
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Set up Java (for Gradle)
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Set up Flutter (provides Android SDK) 
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.7.0' # عدّل إن لزم

  - name: Save basic environment info
    run: |
      echo "GIT BRANCH: ${{ github.ref }}"
      node -v || true
      npm -v || true
      java -version || true
      flutter --version || true
      ./gradlew --version || true
    continue-on-error: true

  - name: Run TypeScript / JS diagnostics (if package.json present)
    id: tsdiag
    run: |
      set -e
      LOG=ts_diagnostics.log
      touch $LOG
      if [ -f package.json ]; then
        echo "Found package.json; running npm ci and type check..."
        npm ci --no-audit --no-fund || true
        # run tsc if exists or try to run build
        if npx -y tsc --noEmit >/dev/null 2>&1; then
          npx tsc --noEmit > $LOG 2>&1 || true
        else
          echo "No tsc config or tsc not found; attempting npm run build..."
          npm run build > $LOG 2>&1 || true
        fi
      else
        echo "package.json not found; skipping TS diagnostics" > $LOG
      fi
      tar -czf ts_diag.tgz $LOG || true
    continue-on-error: true

  - name: Upload TS diagnostics artifact
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: ts-diagnostics
      path: ts_diag.tgz

  - name: Try Android Gradle debug build (capture logs)
    id: androidbuild
    run: |
      set -e
      LOG=android_build.log
      cd android || exit 0
      ./gradlew clean assembleDebug --stacktrace > "../$LOG" 2>&1 || true
      cd ..
      gzip -f android_build.log || true
    continue-on-error: true

  - name: Upload Android build log
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: android-build-log
      path: android_build.log.gz

  - name: Analyze Android log for proguard error
    id: detect_proguard
    run: |
      set -e
      if gzip -t android_build.log.gz 2>/dev/null; then
        gzip -d -c android_build.log.gz > android_build.log || true
      fi
      if grep -q 
"getDefaultProguardFile('proguard-android.txt')" android_build.log 2>/dev/null || grep -q "proguard-android.txt" android_build.log 2>/dev/null; then
        echo "proguard_issue=true" >> $GITHUB_OUTPUT
        echo "Detected deprecated proguard usage in Android build log"
      else
        echo "proguard_issue=false" >> $GITHUB_OUTPUT
        echo "No proguard pattern found"
      fi

  - name: Attempt automatic fix for ProGuard usage (create PR)
    if: steps.detect_proguard.outputs.proguard_issue == 'true'
    env:
      BRANCH_NAME: fix/android/proguard-${{ github.run_id }}
    run: |
      set -e
      echo "Applying ProGuard replacement..."
      FILE=android/app/build.gradle
      if [ -f "$FILE" ]; then
        cp "$FILE" "${FILE}.bak.__${GITHUB_RUN_ID}"
        perl -0777 -pe "s/getDefaultProguardFile\((['\"])proguard-android.txt\1\)/getDefaultProguardFile('proguard-android-optimize.txt')/gsm" -i "$FILE" || true
        perl -0777 -pe "s/proguard-android.txt/proguard-android-optimize.txt/gsm" -i "$FILE" || true
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH_NAME"
        git add "$FILE"
        git commit -m "fix(android): use proguard-android-optimize.txt for R8 compatibility" || echo "No changes to commit"
        # Use create-pull-request action to open PR
        echo "Prepared branch $BRANCH_NAME with change"
      else
        echo "File $FILE not found; cannot apply proguard fix"
        exit 1
      fi
  - name: Create Pull Request for ProGuard fix
    if: steps.detect_proguard.outputs.proguard_issue == 'true'
    uses: peter-evans/create-pull-request@v5
    with:
      token: ${{ secrets.GITHUB_TOKEN }}
      commit-message: fix(android): use proguard-android-optimize.txt for R8 compatibility
      branch: ${{ env.BRANCH_NAME }}
      title: fix(android): use proguard-android-optimize.txt for R8 compatibility
      body: |
        Automated PR: Replaced deprecated proguard file reference that breaks Gradle/AGP.
        - Reason: getDefaultProguardFile('proguard-android.txt') prevents R8 optimizations.
        - Change: use getDefaultProguardFile('proguard-android-optimize.txt').
      labels: automated, ci

  - name: Detect missing @types/react or JSX typing errors
    id: detect_ts_types
    run: |
      set -e
      MISSING_TYPES=false
      if [ -f ts_diag.tgz ]; then
        tar -xzf ts_diag.tgz || true
      fi
      if [ -f ts_diagnostics.log ]; then
        if grep -q "Could not find a declaration file for module 'react'" ts_diagnostics.log 2>/dev/null || grep -q "JSX element implicitly has type 'any' because no interface 'JSX.IntrinsicElements' exists" ts_diagnostics.log 2>/dev/null; then
          MISSING_TYPES=true
        fi
      fi
      echo "missing_types=$MISSING_TYPES" >> $GITHUB_OUTPUT

  - name: Attempt automatic fix for TS typings (create PR)
    if: steps.detect_ts_types.outputs.missing_types == 'true'
    env:
      BRANCH_TS: fix/ts-types-${{ github.run_id }}
    run: |
      set -e
      # find frontend package.json (root or first-level)
      FRONTEND_DIR="."
      if [ -f package.json ] && grep -q "\"react\"" package.json 2>/dev/null; then
        FRONTEND_DIR="."
      else
        found=$(find . -maxdepth 2 -name package.json | head -n1 || true)
        if [ -n "$found" ]; then
          FRONTEND_DIR=$(dirname "$found")
        fi
fi
      echo "missing_types=$MISSING_TYPES" >> $GITHUB_OUTPUT

  - name: Attempt automatic fix for TS typings (create PR)
    if: steps.detect_ts_types.outputs.missing_types == 'true'
    env:
      BRANCH_TS: fix/ts-types-${{ github.run_id }}
    run: |
      set -e
      # find frontend package.json (root or first-level)
      FRONTEND_DIR="."
      if [ -f package.json ] && grep -q "\"react\"" package.json 2>/dev/null; then
        FRONTEND_DIR="."
      else
        found=$(find . -maxdepth 2 -name package.json | head -n1 || true)
        if [ -n "$found" ]; then
          FRONTEND_DIR=$(dirname "$found")
        fi
      fi
      echo "Frontend dir: $FRONTEND_DIR"
      TSCONF="$FRONTEND_DIR/tsconfig.json"
      if [ ! -f "$TSCONF" ]; then
        cat > "$TSCONF" <<'EOF'
{
"compilerOptions": {

"target": "ES2019",
"lib": ["DOM", "ES2019"],
"module": "ESNext",
"moduleResolution": "node",
"jsx": "react-jsx",
"esModuleInterop": true,
"allowSyntheticDefaultImports": true,
"skipLibCheck": true,
"strict": false,
"forceConsistentCasingInFileNames": true,
"resolveJsonModule": true,
"isolatedModules": true,
"noEmit": true
},
"include": ["src", "src/**/*"],
"exclude": ["node_modules", "build", "dist"]
}
EOF

        echo "Created $TSCONF"
      else
        echo "tsconfig.json already exists at $TSCONF"
      fi


