name: Unified Production Build & Auto-Deploy (Web, Android, Windows)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-web:
    name: Build & Deploy Web App (GitHub Pages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Run Code Linting Verification
        run: npm run lint

      - name: Compile and Bundle Web App
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Copy index.html to 404.html to support React Router refresh on GitHub Pages
      - name: Configure SPA Fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Deploy Web to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build-bundle
          path: dist/

  build-android:
    name: Build Android Mobile APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Assets for Capacitor
        run: npm run build

      - name: Sync Capacitor Android Configs
        run: npx cap sync android

      - name: Initialize & Fix Gradle Wrapper
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-file
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Build Portable Windows Executable
        run: npm run desktop:build:win

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe-file
          path: dist_desktop/*.exe

  create-unified-release:
    name: Package & Publish GitHub Release 🎁
    needs: [build-and-deploy-web, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create Release Directory
        run: mkdir release_assets

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk-file
          path: temp_android

      - name: Rename & Stage Android APK
        run: cp temp_android/app-debug.apk release_assets/MedCenter-HIS-v1.0.${{ github.run_number }}.apk

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-file
          path: temp_windows

      - name: Rename & Stage Windows Portable EXE
        run: |
          find temp_windows -name "*.exe" -exec cp {} release_assets/MedCenter-HIS-v1.0.${{ github.run_number }}.exe \;

      - name: Create GitHub Continuous Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_assets/MedCenter-HIS-v1.0.${{ github.run_number }}.apk
            release_assets/MedCenter-HIS-v1.0.${{ github.run_number }}.exe
          tag_name: v1.0.${{ github.run_number }}
          name: الإصدار v1.0.${{ github.run_number }} (تطبيقات المنظومة المتكاملة)
          body: |
            ## 🎉 تم بناء وإطلاق تطبيقات المنظومة الطبية بنجاح!
            
            التطبيق متاح الآن للتحميل والاستخدام المباشر على الأجهزة المختلفة بشكل تلقائي ومجاني بالكامل.
            
            ### 🖥️ النظم المدعومة للتحميل:
            - **تطبيق الأندرويد (تثبيت مباشر للهواتف):** 📱 [اضغط لتحميل ملف الـ APK](https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/MedCenter-HIS-v1.0.${{ github.run_number }}.apk)
            - **الكمبيوتر بنظام ويندوز (محمول دون تثبيت):** 💻 [اضغط لتحميل ملف الـ EXE](https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/MedCenter-HIS-v1.0.${{ github.run_number }}.exe)
            - **رابط نسخة الويب الحية (GitHub Pages):** 🌐 [اضغط لتصفح نسخة الويب الحية](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})
            
            ---
            **تفاصيل البناء البرمجي:**
            - رقم البناء التلقائي: `v1.0.${{ github.run_number }}`
            - كود التجزئة (SHA): `${{ github.sha }}`
            - رسالة التعديل الأخير: `${{ github.event.head_commit.message }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
