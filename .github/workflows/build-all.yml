name: Build MedCenter for Web, Android, Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      # 1. بناء الويب
      - name: Build web
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-Web
          path: dist/

      # 2. إعداد Capacitor وبناء Android APK
      - name: Setup Capacitor
        run: |
          npm install @capacitor/android @capacitor/cli
          npx cap init MedCenter com.medcenter.app --web-dir=dist
          npx cap add android
      - name: Build Android APK
        run: |
          npm run build
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ..

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 3. بناء تطبيق Windows باستخدام Electron
      - name: Install electron-builder
        run: npm install electron electron-builder --save-dev
      - name: Build Windows exe
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-Windows
          path: dist_electron/*.exe
