mkdir -p .github/workflows
cat > .github/workflows/build-apk.yml << 'EOF'
name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Setup Capacitor
        run: |
          npx cap init MedCenter com.medcenter.app --web-dir=dist
          npx cap add android
          npx cap sync
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ..
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
EOF
