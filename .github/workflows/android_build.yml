name: Build & Deploy Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          # Use npm install instead of npm ci if there are architecture mismatches for native binaries
          # Adding --include=optional to ensure tailwind oxide is included if needed
          npm install --include=optional

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Repair Gradle Wrapper (Force Refresh)
        run: |
          cd android
          gradle wrapper

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-HIS-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Optional: Release build (Requires keystore secrets)
      # - name: Build Release APK
      #   run: |
      #     cd android
      #     ./gradlew assembleRelease

