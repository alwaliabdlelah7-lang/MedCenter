name: Build & Deploy Android App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          # Use npm install instead of npm ci if there are architecture mismatches for native binaries
          # Adding --include=optional to ensure tailwind oxide is included if needed
          npm install --include=optional

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedCenter-HIS-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }} (Automatic Build)
          body: |
            Automatic Android Build generated by GitHub Actions.
            
            **Changes in this version:**
            - ${{ github.event.head_commit.message }}
            
            **Download APK:** [app-debug.apk](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-debug.apk)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Release build (Requires keystore secrets)
      # - name: Build Release APK
      #   run: |
      #     cd android
      #     ./gradlew assembleRelease

