name: Multi-Platform Build CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Build Web Application
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Build Web Assets for Capacitor
        run: npm run build
      - name: Capacitor Sync
        run: npx cap sync android
      - name: Fix Gradle Wrapper
        run: |
          cd android
          rm gradle/wrapper/gradle-wrapper.jar
          # Download a fresh wrapper jar if corrupt (common in git sync issues)
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Build Android APK
        run: |
          cd android && ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Build Windows Executable
        run: npm run desktop:build:win
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-application
          path: dist_desktop/
