name: Create Release Assets

on:
  push:
    tags:
      - 'v*'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: |
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Build Desktop App
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run desktop:build:win
          else
            npm run desktop:build:linux
          fi
        shell: bash
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: dist_desktop/

  create-release:
    needs: [build-web, build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          cp artifacts/android-apk/app-debug.apk release_assets/MedCenter-HIS-v${{ github.ref_name }}.apk
          # More logic for desktop files if needed
          zip -r release_assets/MedCenter-Web-v${{ github.ref_name }}.zip artifacts/web-build/

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
